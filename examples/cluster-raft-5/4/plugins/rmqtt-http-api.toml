##--------------------------------------------------------------------
## rmqtt-http-api
##--------------------------------------------------------------------

##Number of worker threads
workers = 1
## Max Row Limit
max_row_limit = 10_000
## HTTP Listener
http_laddr = "0.0.0.0:6063"




## Dashboard SPA static files directory
## Path is relative to the server's working directory (CWD).
## Set to "" or comment out to disable the dashboard.
dashboard_static_dir = "../../../rmqtt-dashboard/"
